<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeatScout</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="search-panel" aria-labelledby="app-title">
        <p class="app-kicker">Live Event Inventory</p>
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">S</div>
          <div>
            <h1 id="app-title">SeatScout</h1>
            <p>Availability, sections, and trusted checkout paths in one refined view.</p>
          </div>
        </div>

        <form id="seat-form" class="seat-form">
          <label>
            <span>Event</span>
            <input
              id="event-name"
              name="event"
              type="search"
              value="Miami Grand Prix"
              placeholder="Miami Grand Prix, Beyonce, Knicks..."
              autocomplete="off"
              required
            />
          </label>

          <label>
            <span>Date</span>
            <input id="event-date" name="date" type="date" value="2026-05-05" required />
          </label>

          <label>
            <span>City or venue</span>
            <input
              id="event-place"
              name="place"
              type="text"
              value="Miami"
              placeholder="Miami, Madison Square Garden..."
              autocomplete="off"
            />
          </label>

          <fieldset>
            <legend>Inventory source</legend>
            <div class="source-options">
              <label class="source-option">
                <input type="radio" name="source" value="demo" checked />
                <span>Demo inventory</span>
              </label>
              <label class="source-option">
                <input type="radio" name="source" value="endpoint" />
                <span>Provider endpoint</span>
              </label>
              <label class="source-option">
                <input type="radio" name="source" value="ticketmaster" />
                <span>Ticketmaster search</span>
              </label>
            </div>
          </fieldset>

          <label id="endpoint-row" class="is-hidden">
            <span>Inventory API URL</span>
            <input
              id="endpoint-url"
              name="endpoint"
              type="url"
              placeholder="https://api.example.com/seat-inventory"
            />
          </label>

          <label id="ticketmaster-row" class="is-hidden">
            <span>Ticketmaster API key</span>
            <input id="ticketmaster-key" name="ticketmasterKey" type="password" placeholder="Paste key" />
          </label>

          <button class="primary-button" type="submit">
            <span aria-hidden="true">⌕</span>
            Check seats
          </button>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="event-visual" aria-hidden="true">
          <div class="track-ring">
            <div class="seat-block block-a"></div>
            <div class="seat-block block-b"></div>
            <div class="seat-block block-c"></div>
            <div class="seat-block block-d"></div>
          </div>
        </div>

        <div id="empty-state" class="empty-state">
          <p class="eyebrow">Ready</p>
          <h2>Discover seats with confidence.</h2>
          <p>
            Search by event, date, and venue to compare availability before moving to a trusted ticket source.
          </p>
        </div>

        <div id="loading-state" class="status-card is-hidden">
          <div class="loader" aria-hidden="true"></div>
          <p>Checking inventory...</p>
        </div>

        <div id="result-state" class="result-state is-hidden"></div>
        <div id="error-state" class="status-card error is-hidden"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
